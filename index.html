        function createParticles() {
            canvas = document.getElementById('particleCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 2.5 + 0.8
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#d4af37';
            particles.forEach(p => {
                ctx.globalAlpha = Math.random() * 0.8 + 0.2;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                p.y += p.speed;
                if (p.y > canvas.height) p.y = 0;
            });
            ctx.globalAlpha = 1;
        }

            currentSpreadType = type;

function getContextualMeaning(card, spreadType, isReversed, positionIndex = 0) {
    const key = isReversed ? 'reversed' : 'upright';
    const context = contextualMeanings[card.id];
    
    let coreMeaning = isReversed ? card.reversedMeaning : card.meaning;
    if (context && context[spreadType] && context[spreadType][key]) {
        coreMeaning = context[spreadType][key];
    }

    // Chọn ngẫu nhiên 1 cách nói từ mảng (position-specific)
    let positionFlavor = '';
    const flavorGroup = positionSpecificFlavors[spreadType];
    if (flavorGroup && flavorGroup[positionIndex]) {
        const options = flavorGroup[positionIndex][key];
        if (Array.isArray(options) && options.length > 0) {
            positionFlavor = options[Math.floor(Math.random() * options.length)];
        } else if (typeof options === 'string') {
            positionFlavor = options;
        }
    }

    return coreMeaning + (positionFlavor ? `<br><br><span style="color:#ff9f1c; font-weight:600;">${positionFlavor}</span>` : '');
}

                { name: "Lửa", emoji: "🔥", desc: isReversed ? "Đam mê bị kìm hãm hoặc quá mạnh" : "Sức mạnh sáng tạo và hành động" },

    else if (card.id.includes("six")){ number = "6"; numberMeaning = isReversed ? "Mất cân bằng cho – nhận" : "Hài hòa, trao đổi và chữa lành"; }
    else if (card.id.includes("seven")){ number = "7"; numberMeaning = isReversed ? "Ảo tưởng, né tránh sự thật" : "Suy tư sâu, tìm kiếm chân lý nội tâm"; }
    else if (card.id.includes("eight")){ number = "8"; numberMeaning = isReversed ? "Kiệt sức, lặp lại vô ích" : "Sức mạnh vô hạn, kiên trì và thành tựu"; }
    else if (card.id.includes("nine")){ number = "9"; numberMeaning = isReversed ? "Mãn nguyện giả tạo hoặc kiêu ngạo" : "Gần hoàn thành, thành tựu cá nhân cao"; }
    else if (card.id.includes("ten")){ number = "10"; numberMeaning = isReversed ? "Chu kỳ kết thúc đau đớn" : "Hoàn thành một chu kỳ lớn, viên mãn"; }
    else { number = "—"; numberMeaning = "Bài học định mệnh đặc biệt của linh hồn"; }

    return { 
        element: `${element} ${elementEmoji}`, 
        elementDesc, 
        number,

            `Từ ${mainMeaning} của lá chính đến ${clarMeaning} của lá phụ là một chuỗi chuyển hóa tích cực. Thành công vật chất và danh tiếng đang chờ bạn.`,
            `Lá chính cảnh báo ${mainMeaning}, lá phụ mang giải pháp ${clarMeaning}. Đây chính là chìa khóa để bạn vượt qua thử thách và vươn lên.`,
            `Kết hợp hai lá khẳng định: ${mainMeaning} là bài học, ${clarMeaning} là phần thưởng. Sự nghiệp của bạn đang đi đúng hướng định mệnh.`
        ];
    } 
    else { // journey
        combineTemplates = [
            `Lá chính <strong>${mainCard.name}</strong> hé lộ ${mainMeaning}. Lá phụ <strong>${clarCard.name}</strong> bổ trợ: ${clarMeaning}. Hai lá cùng nhau vẽ nên một bước chuyển mình quan trọng trên hành trình linh hồn.`,
            `Từ ${mainMeaning} của lá chính đến ${clarMeaning} của lá phụ là thông điệp vũ trụ: bạn đang được dẫn dắt đến tầng thức tỉnh cao hơn.`,
            `Hai lá kết hợp tạo thành một chu kỳ hoàn chỉnh: ${mainMeaning} là bài học, ${clarMeaning} là ánh sáng dẫn lối trên hành trình linh hồn.`,
            `Lá chính nhắc nhở ${mainMeaning}, lá phụ xác nhận ${clarMeaning}. Đây là dấu hiệu rõ ràng rằng linh hồn bạn đang lột xác mạnh mẽ.`,
            `Kết hợp hai lá cho thấy hành trình đang chuyển từ bóng tối (${mainMeaning}) sang ánh sáng (${clarMeaning}). Bạn đang được vũ trụ ôm ấp.`,
            `Lá chính mang năng lượng ${mainMeaning}, lá phụ bổ sung ${clarMeaning}. Đây là khoảnh khắc quan trọng nhất của hành trình linh hồn hiện tại.`,
            `Hai lá tạo nên sự đồng bộ hoàn hảo giữa ${mainMeaning} và ${clarMeaning}. Vũ trụ đang đẩy bạn tiến gần hơn đến bản ngã cao nhất.`,
            `Từ lá chính đến lá phụ là dòng chảy từ ${mainMeaning} đến ${clarMeaning}. Hành trình của bạn đang đồng bộ với nhịp điệu của vũ trụ.`,
            `Lá chính cảnh báo ${mainMeaning}, lá phụ mang hy vọng ${clarMeaning}. Đây là lúc linh hồn bạn được tái sinh và chữa lành sâu sắc.`,
            `Kết hợp hai lá khẳng định: bạn đang đi đúng con đường định mệnh. ${mainMeaning} là nền tảng, ${clarMeaning} là phần thưởng của hành trình linh hồn.`
        ];
    }

    const randomCombine = combineTemplates[Math.floor(Math.random() * combineTemplates.length)];

    return `
        <div class="clarifier-text">
            ↳ <b>Lá phụ: ${clarCard.name} ${clarCard.isReversed ? '(Ngược)' : ''}</b><br>
            ${clarMeaning}
        </div>
        <div class="layer-box">
            <span class="layer-title">🔗 Ý NGHĨA KẾT HỢP CỦA HAI LÁ</span>
            <p>${randomCombine}</p>
        </div>`;
}
function renderDetails() {

    container.innerHTML = '';
    const spreadConf = spreadTypes[currentSpreadType];
   
    currentCards.forEach((card, index) => {
        const cardEl = document.getElementById(`card-${index}`);
        if (cardEl && cardEl.classList.contains('flipped')) {
            const pos = spreadConf.positions[index];
            let html = `
                <div class="detail-box">
                    <div class="detail-title">${pos.title}: <span>${card.name} ${card.isReversed ? '(Ngược)' : ''}</span></div>
                    ${getLayeredAnalysis(card, currentSpreadType ,index)}
            `;
            if (clarifierCards[index]) {
                html += getClarifierLayeredAnalysis(card, clarifierCards[index], currentSpreadType);
            }
            html += `</div>`;
            container.innerHTML += html;
        }
    });
}

    // ====================== THÔNG ĐIỆP LIÊN KẾT TỪ VŨ TRỤ (ĐÃ LÀM ĐA DẠNG NHIỀU KIỂU) ======================
    const deepMessages = [
        "Từ chiều sâu vũ trụ, các lá bài đang vẽ nên một bức tranh hoàn chỉnh: mọi thứ bạn đang trải qua đều là phần của kế hoạch thiêng liêng, nơi thử thách hôm nay chính là nền tảng cho ánh sáng mai sau.",
        "Linh hồn bạn đã khao khát nhận được thông điệp này từ nhiều kiếp. Mọi lá chính và lá phụ đều đang dẫn dắt bạn về với phiên bản cao nhất, rực rỡ nhất của chính mình.",
        "Đây là khoảnh khắc tái sinh linh hồn: các tầng ý nghĩa liên kết chặt chẽ, cho thấy mọi lựa chọn, mọi cảm xúc và mọi hành động của bạn đều được vũ trụ ghi nhận và ban phước.",
        "Vũ trụ đang thì thầm qua từng lá bài rằng bạn không bao giờ cô đơn. Mọi bước chân, mọi nước mắt, mọi niềm vui đều có ý nghĩa sâu sắc trong hành trình tiến hóa của linh hồn.",
        "Các vì sao đang sắp xếp, dòng năng lượng vũ trụ đang chảy về phía bạn. Hãy mở lòng đón nhận vì bạn xứng đáng với tất cả những điều tốt đẹp đang đến."
    ];

    let cosmicLink = `Từ chiều sâu vũ trụ, các lá bài đang vẽ nên một bức tranh hoàn chỉnh: <strong>${currentCards.map(c => c.isReversed ? c.reversedKeyword : c.keyword).join(' • ')}</strong>.<br><br>`;
    cosmicLink += deepMessages[Math.floor(Math.random() * deepMessages.length)] + "<br><br>";

    // Phần tình yêu được làm đa dạng nhiều kiểu
    if (currentSpreadType === 'love') {
        const loveMessages = [
            "Trong tình yêu, chữa lành nội tâm là chìa khóa quan trọng nhất để đón nhận tình yêu đích thực và sâu sắc. Khi bạn dũng cảm đối diện và chữa lành vết thương cũ, vũ trụ sẽ sắp xếp một mối liên kết linh hồn chân thành và bền vững.",
            "Tình yêu lúc này là bài học lớn về sự chân thành và buông bỏ. Vũ trụ nhắc nhở rằng chỉ khi trái tim bạn được chữa lành, tình yêu mới thực sự nở hoa và mang lại sự toàn vẹn mà linh hồn bạn đã chờ đợi qua nhiều kiếp.",
            "Trong hành trình tình cảm, lá bài đang chỉ ra rằng tình yêu đích thực không đến từ sự hoàn hảo, mà đến từ sự dũng cảm mở lòng và tin tưởng. Hãy chữa lành chính mình trước khi đón nhận người ấy.",
            "Vũ trụ đang gửi đến bạn thông điệp: Tình yêu sâu sắc chỉ thực sự đến khi bạn học được cách yêu thương và chữa lành bản thân. Đó là nền tảng cho một mối quan hệ hài hòa và lâu dài.",
            "Trong tình yêu, mọi thử thách hiện tại đều là cơ hội để bạn trưởng thành. Khi bạn sẵn sàng buông bỏ nỗi đau cũ, tình yêu định mệnh sẽ đến và mang lại ánh sáng cho trái tim bạn."
        ];
        cosmicLink += loveMessages[Math.floor(Math.random() * loveMessages.length)];
    } 
    else if (currentSpreadType === 'career') {
        cosmicLink += `Trong sự nghiệp, vũ trụ đang thử thách và rèn luyện bạn để trở thành phiên bản mạnh mẽ hơn. Hãy tin rằng mọi nỗ lực, mọi bài học đều đang dẫn bạn đến vị trí xứng đáng với tài năng và tầm nhìn của mình.`;
    } 
    else {
        cosmicLink += `Trên hành trình linh hồn, bạn đang bước vào một chu kỳ chuyển hóa mạnh mẽ. Mọi thử thách đều là bài học cần thiết để bạn lột xác, trở nên toàn vẹn và gần gũi hơn với bản ngã cao nhất.`;
    }

    // Thông điệp cuối cùng cũng được làm đa dạng
    const finalMessages = [
        "Thông điệp cuối cùng từ vũ trụ: Hãy lắng nghe trái tim, tin tưởng và dũng cảm bước tiếp. Ánh sáng luôn ở phía trước.",
        "Thông điệp cuối cùng từ vũ trụ: Bạn không bao giờ cô đơn. Hãy mở lòng đón nhận và tin tưởng vào dòng chảy của định mệnh.",
        "Thông điệp cuối cùng từ vũ trụ: Mọi tầng ý nghĩa đều nhắc nhở bạn – bạn là con của vũ trụ. Hãy yêu thương bản thân và dũng cảm sống trọn vẹn.",
        "Thông điệp cuối cùng từ vũ trụ: Ánh sáng đang chờ bạn ở phía trước. Hãy tin tưởng, chữa lành và bước đi với trái tim rộng mở.",
        "Thông điệp cuối cùng từ vũ trụ: Vũ trụ luôn ủng hộ bạn. Hãy lắng nghe tiếng lòng và dũng cảm theo đuổi những gì trái tim thật sự khao khát."
    ];
    cosmicLink += `<br><br><strong>${finalMessages[Math.floor(Math.random() * finalMessages.length)]}</strong>`;

    summaryHTML += `
        <div class="summary-title">Thông Điệp Liên Kết Từ Vũ Trụ</div>
        <p style="line-height:1.85;">${cosmicLink}</p>
    `;

    // Archetype & Câu Nói Tượng Trưng (giữ nguyên)
        // === ARCHETYPE & CÂU NÓI TƯỢNG TRƯNG - HIỂN THỊ ĐẸP HƠN ===
    summaryHTML += `
        <div style="margin-top: 40px; padding: 25px; background: rgba(212,175,55,0.12); border: 1px solid var(--gold); border-radius: 12px;">
            <div style="color: var(--gold); font-family: 'Cinzel Decorative', cursive; font-size: 1.4rem; text-align: center; margin-bottom: 25px;">
                🔮 Archetype 
            </div>`;

    currentCards.forEach((card) => {
        const extras = cardExtras[card.id] || {};
        const person = extras.person || "Một linh hồn trên hành trình";
        const quote = extras.quote || "“Mọi thứ đều có ý nghĩa riêng của nó.”";

        summaryHTML += `
            <div style="margin-bottom: 25px; padding: 18px; background: rgba(0,0,0,0.3); border-radius: 12px; border-left: 4px solid var(--gold);">
                <strong style="color:#ffd700; font-size: 1.1rem;">${card.name} ${card.isReversed ? '(Ngược)' : ''}</strong><br><br>
                
                <span style="color: #e0d4ff;">👤 <strong>Người / Nhân vật tượng trưng:</strong></span><br>
                <span style="font-style: italic; color: #d4af37;">${person}</span><br><br>
                
                <span style="color: #e0d4ff;">💬 <strong>Câu nói sâu sắc:</strong></span><br>
                <span style="font-size: 1.05rem; line-height: 1.5; color: #f0e6ff;">
                    “${quote}”
                </span>
            </div>`;
    });

    summaryHTML += `</div>`;

    summaryHTML += `</div>`;

    document.getElementById('summaryText').innerHTML = summaryHTML;
    document.getElementById('summaryBox').style.display = 'block';
    document.getElementById('summaryBox').scrollIntoView({ behavior: 'smooth', block: 'center' });
}   

      function saveReading() {
    const spreadConf = spreadTypes[currentSpreadType];
    
    // Lấy thông điệp liên kết từ vũ trụ nếu đã tạo
    let cosmicMessage = "Chưa tạo thông điệp liên kết từ vũ trụ.";
    const summaryBox = document.getElementById('summaryBox');
    if (summaryBox && summaryBox.style.display !== 'none') {
        const summaryText = document.getElementById('summaryText');
        if (summaryText) cosmicMessage = summaryText.innerHTML;
    }

    const savedCards = currentCards.map((card, index) => ({
        position: spreadConf.positions[index],
        card: {...card},
        clarifier: clarifierCards[index] ? {...clarifierCards[index]} : null
    }));

    const reading = {
        id: Date.now(),
        timestamp: new Date().toLocaleString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh' }),
        spreadType: currentSpreadType,
        spreadName: spreadConf.name,
        userName: currentUserName,
        question: currentQuestion,
        cards: savedCards,
        cosmicMessage: cosmicMessage
    };

    readingHistory.unshift(reading);
    if (readingHistory.length > 20) readingHistory.pop();
    
    localStorage.setItem('tarotHistory', JSON.stringify(readingHistory));
    
    alert('✅ Đã lưu trải bài thành công!');
}

        function showHistory() {
            const modal = document.getElementById('historyModal');
            const listEl = document.getElementById('historyList');
            listEl.innerHTML = '';
            if (readingHistory.length === 0) {
                listEl.innerHTML = `<p style="text-align:center; padding:30px; color:#aaa;">Chưa có trải bài nào được lưu. Hãy trải bài và lưu để xem lại nhé!</p>`;
            } else {
                readingHistory.forEach((reading, idx) => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <strong>${reading.timestamp} — ${reading.spreadName}</strong><br>
                                <em>${reading.question}</em>
                            </div>
                            <div style="font-size:0.85rem; color:var(--gold);">${reading.cards.length} lá</div>
                        </div>
                    `;
                    item.onclick = () => viewPastReading(idx);
                    listEl.appendChild(item);
                });
            }
            modal.style.display = 'flex';
        }

        function hideHistory() {
            document.getElementById('historyModal').style.display = 'none';
        }

        function clearHistory() {
            if (confirm('Bạn chắc chắn muốn xóa TOÀN BỘ lịch sử trải bài?')) {
                readingHistory = [];
                localStorage.setItem('tarotHistory', '[]');
                hideHistory();
                showHistory();
            }
        }

               function viewPastReading(idx) {
            hideHistory();
            const reading = readingHistory[idx];
            const container = document.getElementById('spreadContainer');
            const panel = document.getElementById('readingPanel');
            
            container.innerHTML = '';
            panel.classList.add('show');
            document.getElementById('summaryBtn').style.display = 'none';
            document.getElementById('readingHeader').innerHTML = `📜 Trải Bài ${reading.spreadName} • ${reading.timestamp}`;

            let htmlCards = '';
            reading.cards.forEach((item ,index) => {
                const card = item.card;
                const emoji = card.isReversed ? card.reversedEmoji : card.emoji;
                const revText = card.isReversed ? '<span style="color:#ff6b6b; font-size:0.8rem;">(Ngược)</span>' : '';
                
                htmlCards += `
                    <div class="card-wrapper">
                        <div class="position-label">${item.position.title}<br><span style="font-size:0.75rem; color:#aaa; font-weight:normal;">${item.position.desc}</span></div>
                        <div class="card-container">
                            <div class="tarot-card flipped ${card.isReversed ? 'reversed' : ''}">
                                <div class="card-face card-back"></div>
                                <div class="card-face card-front">
                                    <div class="card-emoji">${emoji}</div>
                                    <div class="card-name">${card.name} ${revText}</div>
                                </div>
                            </div>
                        </div>
                `;

                if (item.clarifier) {
                    const cl = item.clarifier;
                    const clEmoji = cl.isReversed ? cl.reversedEmoji : cl.emoji;
                    const clRev = cl.isReversed ? '<span style="color:#ff6b6b; font-size:0.78rem;">(Ngược)</span>' : '';
                    htmlCards += `
                        <div class="clarifier-card ${cl.isReversed ? 'reversed' : ''}" style="animation: none; opacity:1; transform:rotate(12deg);">
                            <div class="clarifier-inner">
                                <div class="clarifier-tarot flipped">
                                    <div class="clarifier-face clarifier-back"></div>
                                    <div class="clarifier-face clarifier-front">
                                        <div class="clarifier-emoji">${clEmoji}</div>
                                        <div class="clarifier-name">${cl.name} ${clRev}</div>
                                        <div class="clarifier-label">LÁ PHỤ</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                htmlCards += `</div>`;
            });
            container.innerHTML = htmlCards;

            // === Phần chi tiết từng lá ===
            document.getElementById('detailsContainer').innerHTML = '';
            reading.cards.forEach((item) => {
                const card = item.card;
                let detailHTML = `
                    <div class="detail-box">
                        <div class="detail-title">${item.position.title}: <span>${card.name} ${card.isReversed ? '(Ngược)' : ''}</span></div>
                        ${getLayeredAnalysis(card, reading.spreadType,index)}
                `;
                if (item.clarifier) {
                    detailHTML += getClarifierLayeredAnalysis(card, item.clarifier, reading.spreadType);
                }
                detailHTML += `</div>`;
                document.getElementById('detailsContainer').innerHTML += detailHTML;
            });

            // === PHẦN QUAN TRỌNG: HIỂN THỊ THÔNG ĐIỆP LIÊN KẾT TỪ VŨ TRỤ ===
            if (reading.cosmicMessage && reading.cosmicMessage !== "Chưa tạo thông điệp liên kết từ vũ trụ.") {
                const cosmicHTML = `
                    <div class="summary-box" style="margin-top: 35px;">
                        <div class="summary-title">Thông Điệp Liên Kết Từ Vũ Trụ</div>
                        <div style="line-height:1.65; padding: 15px 0;">${reading.cosmicMessage}</div>
                    </div>`;
                document.getElementById('detailsContainer').innerHTML += cosmicHTML;
            }
        }
        
// ====================== CÁC HÀM CÀI ĐẶT BỘ BÀI ======================
function showSettings() {
    document.getElementById('settingsModal').style.display = 'flex';
}

function hideSettings() {
    document.getElementById('settingsModal').style.display = 'none';
}

function changeDeckSize(size) {
    currentDeckSize = size;
    const msg = size === 78 ? "✅ Đã chuyển sang bộ 78 lá chuẩn" :
                size === 79 ? "✅ Đã chuyển sang bộ 79 lá (thêm The Unknown)" :
                "✅ Đã chuyển sang bộ 80 lá (thêm The Unknown & The Cosmos)";
    alert(msg);
    hideSettings();
}
