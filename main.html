        function createParticles() {
            canvas = document.getElementById('particleCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 2.5 + 0.8
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#d4af37';
            particles.forEach(p => {
                ctx.globalAlpha = Math.random() * 0.8 + 0.2;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                p.y += p.speed;
                if (p.y > canvas.height) p.y = 0;
            });
            ctx.globalAlpha = 1;
        }

    ];

    const randomCombine = combineTemplates[Math.floor(Math.random() * combineTemplates.length)];

    return `

            });
            const deepMessages = [
                "Từ chiều sâu vũ trụ, các lá bài đang vẽ nên một bức tranh hoàn chỉnh: mọi thứ bạn đang trải qua đều là phần của kế hoạch thiêng liêng, nơi thử thách hôm nay chính là nền tảng cho ánh sáng mai sau.",
                "Linh hồn bạn đã khao khát nhận được thông điệp này từ nhiều kiếp. Mọi lá chính và lá phụ đều đang dẫn dắt bạn về với phiên bản cao nhất của chính mình.",
                "Đây là khoảnh khắc tái sinh: các tầng ý nghĩa liên kết chặt chẽ, cho thấy mọi lựa chọn, mọi cảm xúc và mọi hành động của bạn đều đang được vũ trụ ghi nhận và hỗ trợ."
            ];
            let cosmicLink = `Từ chiều sâu vũ trụ, các lá bài đang vẽ nên một bức tranh hoàn chỉnh: <strong>${currentCards.map(c => c.isReversed ? c.reversedKeyword : c.keyword).join(' • ')}</strong>.<br><br>`;
            cosmicLink += deepMessages[Math.floor(Math.random() * deepMessages.length)] + "<br><br>";
            if (currentSpreadType === 'love') cosmicLink += `Trong tình yêu, các lá chính và lá phụ đã liên kết chặt chẽ để cho thấy rằng khi bạn chữa lành nội tâm, tình yêu định mệnh sẽ nở hoa mang lại sự toàn vẹn mà linh hồn bạn đã chờ đợi qua nhiều kiếp.`;
            else if (currentSpreadType === 'career') cosmicLink += `Trong sự nghiệp, các tầng ý nghĩa của lá chính và lá phụ đã hòa quyện, cho thấy vũ trụ đang sắp xếp để bạn nhận được những gì xứng đáng với nỗ lực và tầm nhìn của mình.`;
            else cosmicLink += `Trên hành trình linh hồn, bạn đang bước vào chu kỳ tái sinh mạnh mẽ. Mọi lá bài đều thì thầm rằng bạn đã sẵn sàng cho cấp độ tồn tại mới.`;
            cosmicLink += `<br><br><strong>Thông điệp cuối cùng từ vũ trụ:</strong> Bạn không bao giờ cô đơn. Mọi tầng ý nghĩa, mọi nhánh phụ đều đã được dệt nên để nhắc nhở bạn: bạn là con của vũ trụ. Hãy lắng nghe, tin tưởng và hành động bằng trái tim.`;
            summaryHTML += `<div class="summary-title">Thông Điệp Liên Kết Từ Vũ Trụ</div><p style="line-height:1.85;">${cosmicLink}</p>`;
            const summaryBox = document.getElementById('summaryBox');
            document.getElementById('summaryText').innerHTML = summaryHTML;
            summaryBox.style.display = 'block';
            summaryBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function saveReading() {
            const spreadConf = spreadTypes[currentSpreadType];
            const savedCards = currentCards.map((card, index) => ({
                position: spreadConf.positions[index],
                card: {...card},
                clarifier: clarifierCards[index] ? {...clarifierCards[index]} : null
            }));
            const reading = {
                id: Date.now(),
                timestamp: new Date().toLocaleString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh' }),
                spreadType: currentSpreadType,
                spreadName: spreadConf.name,
                userName: currentUserName,
                question: currentQuestion,
                cards: savedCards
            };
            readingHistory.unshift(reading);
            if (readingHistory.length > 20) readingHistory.pop();
            localStorage.setItem('tarotHistory', JSON.stringify(readingHistory));
            alert('✅ Đã lưu trải bài thành công!\nBạn có thể xem lại bất kỳ lúc nào trong phần "Lịch sử trải bài".');
        }

        function showHistory() {
            const modal = document.getElementById('historyModal');
            const listEl = document.getElementById('historyList');
            listEl.innerHTML = '';
            if (readingHistory.length === 0) {
                listEl.innerHTML = `<p style="text-align:center; padding:30px; color:#aaa;">Chưa có trải bài nào được lưu. Hãy trải bài và lưu để xem lại nhé!</p>`;
            } else {
                readingHistory.forEach((reading, idx) => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <strong>${reading.timestamp} — ${reading.spreadName}</strong><br>
                                <em>${reading.question}</em>
                            </div>
                            <div style="font-size:0.85rem; color:var(--gold);">${reading.cards.length} lá</div>
                        </div>
                    `;
                    item.onclick = () => viewPastReading(idx);
                    listEl.appendChild(item);
                });
            }
            modal.style.display = 'flex';
        }

        function hideHistory() {
            document.getElementById('historyModal').style.display = 'none';
        }

        function clearHistory() {
            if (confirm('Bạn chắc chắn muốn xóa TOÀN BỘ lịch sử trải bài?')) {
                readingHistory = [];
                localStorage.setItem('tarotHistory', '[]');
                hideHistory();
                showHistory();
            }
        }

        function viewPastReading(idx) {
            hideHistory();
            const reading = readingHistory[idx];
            const container = document.getElementById('spreadContainer');
            const panel = document.getElementById('readingPanel');
            container.innerHTML = '';
            panel.classList.add('show');
            document.getElementById('summaryBtn').style.display = 'none';
            document.getElementById('readingHeader').innerHTML = `📜 Trải Bài ${reading.spreadName} • ${reading.timestamp}`;
            let htmlCards = '';
            reading.cards.forEach((item) => {
                const card = item.card;
                const emoji = card.isReversed ? card.reversedEmoji : card.emoji;
                const revText = card.isReversed ? '<span style="color:#ff6b6b; font-size:0.8rem;">(Ngược)</span>' : '';
                htmlCards += `
                    <div class="card-wrapper">
                        <div class="position-label">${item.position.title}<br><span style="font-size:0.75rem; color:#aaa; font-weight:normal;">${item.position.desc}</span></div>
                        <div class="card-container">
                            <div class="tarot-card flipped ${card.isReversed ? 'reversed' : ''}">
                                <div class="card-face card-back"></div>
                                <div class="card-face card-front">
                                    <div class="card-emoji">${emoji}</div>
                                    <div class="card-name">${card.name} ${revText}</div>
                                </div>
                            </div>
                        </div>
                `;
                if (item.clarifier) {
                    const cl = item.clarifier;
                    const clEmoji = cl.isReversed ? cl.reversedEmoji : cl.emoji;
                    const clRev = cl.isReversed ? '<span style="color:#ff6b6b; font-size:0.78rem;">(Ngược)</span>' : '';
                    htmlCards += `
                        <div class="clarifier-card ${cl.isReversed ? 'reversed' : ''}" style="animation: none; opacity:1; transform:rotate(12deg);">
                            <div class="clarifier-inner">
                                <div class="clarifier-tarot flipped">
                                    <div class="clarifier-face clarifier-back"></div>
                                    <div class="clarifier-face clarifier-front">
                                        <div class="clarifier-emoji">${clEmoji}</div>
                                        <div class="clarifier-name">${cl.name} ${clRev}</div>
                                        <div class="clarifier-label">LÁ PHỤ</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                htmlCards += `</div>`;
            });
            container.innerHTML = htmlCards;
            document.getElementById('detailsContainer').innerHTML = '';
            reading.cards.forEach((item) => {
                const card = item.card;
                let detailHTML = `
                    <div class="detail-box">
                        <div class="detail-title">${item.position.title}: <span>${card.name} ${card.isReversed ? '(Ngược)' : ''}</span></div>
                        ${getLayeredAnalysis(card, reading.spreadType)}
                `;
                if (item.clarifier) {
                    detailHTML += getClarifierLayeredAnalysis(card, item.clarifier);
                }
                detailHTML += `</div>`;
                document.getElementById('detailsContainer').innerHTML += detailHTML;
            });
        }

        window.onload = () => {
            createParticles();
            setInterval(drawParticles, 80);
        };
    </script>
</body>
</html>
